<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Teamgeist HR - Mitarbeiterverwaltung</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header-container">
        <img src="../../Images/logo.png" alt="Teamgeist HR Logo" class="logo">
        <h1>Mitarbeiterverwaltung</h1>
    </div>

    <button onclick="window.location.href='Homepage.html'">Zurück zur Startseite</button>
    <br><br><br>

    <button onclick="document.getElementById('popupAdd').showModal()">Mitarbeiter hinzufügen</button>
    <button onclick="document.getElementById('popupEdit').showModal()">Mitarbeiter bearbeiten</button>
    <button onclick="document.getElementById('popupDelete').showModal()">Mitarbeiter löschen</button>

    <dialog id="popupAdd">
        <h2>Neuen Mitarbeiter anlegen</h2>
        <form method="dialog">
            <table>
                <tr>
                    <td>ID</td>
                    <td><input type="number" required></td>
                </tr>
                <tr>
                    <td>Vorname:</td>
                    <td><input type="text" required></td>
                </tr>
                <tr>
                    <td>Nachname:</td>
                    <td><input type="text" required></td>
                </tr>
                <tr>
                    <td>Abteilung:</td>
                    <td><input type="text" required></td>
                </tr>
            </table>
            <br>
            <button type="submit">Speichern</button>
            <button type="button" onclick="document.getElementById('popupAdd').close()">Abbrechen</button>
        </form>
    </dialog>

    <dialog id="popupEdit">
        <h2>Mitarbeiterdaten bearbeiten</h2>
        <form method="dialog">
            <p>Bitte gib die ID oder den Namen des Mitarbeiters ein:</p>
            <input type="text" placeholder="Name oder ID..." required>
            <br><br>
            <button type="submit">Suchen & Bearbeiten</button>
            <button type="button" onclick="document.getElementById('popupEdit').close()">Abbrechen</button>
        </form>
    </dialog>

    <dialog id="popupDelete">
        <h2>Mitarbeiter löschen</h2>
        <form method="dialog">
            <p>Welcher Mitarbeiter soll gelöscht werden?</p>
            <input type="text" placeholder="Name oder ID..." required>
            <br><br>
            <p style="color: red;">Achtung: Diese Aktion kann nicht rückgängig gemacht werden!</p>
            <button type="submit">Endgültig löschen</button>
            <button type="button" onclick="document.getElementById('popupDelete').close()">Abbrechen</button>
        </form>
    </dialog>

</body>

</html>
