<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-body">
    <form action="" class="auth-box modern" onsubmit="handleRegister(); return false;">
        <div class="auth-logo-container">
            <img src="../Images/logo.png" alt="Teamgeist Logo" class="auth-logo-img">
            <h2 class="auth-logo-text">Team<span class="auth-logo-highlight">geist</span></h2>
        </div>

        <h3 class="auth-kopf">Mitarbeiterverwaltung</h3>
        <p class="auth-untertext">Erstellen Sie ein neues Konto.</p>

        <label for="name" class="auth-label">Name</label>
        <input type="text" id="name" name="name" required class="auth-input-field">

        <label for="email" class="auth-label">E-Mail-Adresse</label>
        <input type="email" id="email" name="email" required class="auth-input-field">

        <label for="password" class="auth-label">Passwort</label>
        <input type="password" id="password" name="password" required class="auth-input-field last">

        <p id="error-msg" style="color: red; display: none;"></p>

        <button type="submit" class="auth-submit-button">
            Registrieren
        </button>

        <div class="auth-fussnote">
            Bereits ein Konto? <a href="LogIn.html" class="auth-link">Anmelden</a> &nbsp;|&nbsp;
            <a href="Homepage.html" class="auth-link">&larr; Zurück</a>
        </div>
    </form>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
